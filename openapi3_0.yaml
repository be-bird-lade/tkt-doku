          format: uuid
        schema_type:
          type: string
          enum:
            - TouristAttraction
            - Restaurant
            - CafeOrCoffeeShop
            - BarOrPub
            - IceCreamShop
            - Hotel
            - Museum
            - Park
            - Church
            - PerformingArtsTheater
            - ArtGallery
            - EventVenue
            - Beach
            - Playground
            - Library
            - Store
            - BoatTerminal
            - LocalBusiness
          description: Schema.org Type für SEO/Google Rich Results
        translations:
          type: array
          items:
            $ref: '#/components/schemas/places_categories_translations'

    places_categories_translations:
      type: object
      properties:
        id:
          type: integer
        places_categories_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── OPENING HOURS PERIODS ──
    opening_hours_periods:
      type: object
      description: |
        Saisonale Öffnungszeiten für einen Ort. Jede Periode hat einen Gültigkeitszeitraum
        und einen Wochenplan mit Zeitfenstern pro Tag.
      properties:
        id:
          type: string
          format: uuid
        place:
          description: "Zugehöriger Ort (M2O → places)"
          type: string
          format: uuid
        source:
          type: string
          enum: [manual, google]
          description: Datenquelle (manuell oder Google Places)
        sort:
          type: integer
        valid_from_month:
          type: integer
          description: "Ab welchem Monat gelten diese Öffnungszeiten (1–12)"
        valid_from_day:
          type: integer
          description: "Optional: Ab welchem Tag (leer = 1. des Monats)"
        valid_to_month:
          type: integer
          description: "Bis zu welchem Monat gelten diese Öffnungszeiten (1–12)"
        valid_to_day:
          type: integer
          description: "Optional: Bis zu welchem Tag (leer = letzter des Monats)"
        valid_from_year:
          type: integer
          description: "Optional: Nur für einmalige Perioden (z.B. Renovierung 2025). Leer = jährlich wiederkehrend."
        hint:
          type: string
          description: Freitext-Hinweis zu den Öffnungszeiten
        schedule:
          type: array
          description: Wochenplan mit Öffnungszeiten pro Tag
          items:
            type: object
            properties:
              weekday:
                type: string
                enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
              status:
                type: string
                enum: [open, closed]
              slots:
                type: array
                description: "Zeitfenster (z.B. 9:00–12:00 und 14:00–18:00)"
                items:
                  type: object
                  properties:
                    open:
                      type: string
                      example: "09:00"
                    close:
                      type: string
                      example: "18:00"
        translations:
          type: array
          items:
            $ref: '#/components/schemas/opening_hours_periods_translations'

    opening_hours_periods_translations:
      type: object
      properties:
        id:
          type: integer
        opening_hours_periods_id:
          type: string
          format: uuid
        languages_code:
          type: string
        label:
          type: string
          description: "Bezeichnung der Periode (z.B. Sommeröffnungszeiten)"
        formatted_schedule:
          type: object
          description: "Strukturierte, mehrsprachige Ausgabe der Öffnungszeiten als JSON"

    # ── PERSONS ──
    persons:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        first_name:
          type: string
        last_name:
          type: string
        slug:
          type: string
        email:
          type: string
        phone:
          type: string
        mobil:
          type: string
        website:
          type: string
          description: Website der Person
        gender:
          type: string
          enum: [male, female, non-binary, prefer-not-to-say]
        title:
          type: string
          enum: [none, Dr., Prof., "Prof. Dr.", Dipl.-Ing., Dipl.-Kfm., Mag., B.Sc., M.Sc., B.A., M.A., LL.M., RA, Dr. med., PD, Univ.-Prof.]
        photo:
          $ref: '#/components/schemas/directus_file'
        person_type:
          type: array
          items:
            type: string
          description: "Kategorien zur Filterung (z.B. Fotograf, Musiker, Redner)"
        translations:
          type: array
          items:
            $ref: '#/components/schemas/persons_translations'
        organizations:
          type: array
          description: |
            Zuordnungen zu Organisationen (O2M → junction_organizations_persons).
            Jede Zuordnung enthält die Organisation, Abteilungen, Jobtitel und ob die Person Stellenkontakt ist.
          items:
            $ref: '#/components/schemas/junction_organizations_persons'

    persons_translations:
      type: object
      properties:
        id:
          type: integer
        persons_id:
          type: string
          format: uuid
        languages_code:
          type: string
        bio:
          type: string
          description: Biografie (HTML)
        description:
          type: string
          description: "Beschreibung (HTML) – z.B. für Redner:innen, Künstler:innen"

    # ── DEPARTMENTS ──
    department:
      type: object
      description: "Abteilungen innerhalb von Organisationen. Werden über junction_organizations_persons zugeordnet."
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        internal_name:
          type: string
          description: Interner Name der Abteilung
        place:
          description: "Optionaler Standort der Abteilung (M2O → places)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/places'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/department_translations'

    department_translations:
      type: object
      properties:
        id:
          type: integer
        department_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── PERSON ROLES ──
    person_roles:
      type: object
      description: "Rollen, die Personen zugeordnet werden können (z.B. Fotograf, Musiker, Redner)"
      properties:
        id:
          type: string
          format: uuid
        translations:
          type: array
          items:
            $ref: '#/components/schemas/person_roles_translations'

    person_roles_translations:
      type: object
      properties:
        id:
          type: integer
        person_roles_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── JUNCTION: ORGANIZATIONS ↔ PERSONS ──
    junction_organizations_persons:
      type: object
      description: |
        Zuordnung zwischen Organisationen und Personen.
        Enthält zusätzliche Kontextinformationen wie Abteilungen, Jobtitel
        und ob die Person als Stellenkontakt fungiert.
      properties:
        id:
          type: string
          format: uuid
        organization:
          description: "Zugehörige Organisation (M2O → organizations)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/organizations'
        person:
          description: "Zugehörige Person (M2O → persons)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/persons'
        is_job_contact:
          type: boolean
          description: Gibt an, ob die Person Ansprechpartner für Stellenanzeigen ist
        sort:
          type: integer
          description: Sortierung aus Personen-Sicht
        sort_org:
          type: integer
          description: Sortierung aus Organisations-Sicht
        departments:
          type: array
          description: "Abteilungen dieser Zuordnung (M2M über junction_organizations_persons_department)"
          items:
            $ref: '#/components/schemas/department'
        job_titles:
          type: array
          description: "Jobtitel dieser Zuordnung (M2M über junction_organizations_persons_job_titles)"
          items:
            $ref: '#/components/schemas/job_titles'

    # ── REGIONS ──
    regions:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        name:
          type: string
        places:
          type: array
          description: "Orte in dieser Region (O2M)"
          items:
            $ref: '#/components/schemas/places'

    # ── ROUTES ──
    routes:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [published, draft, archived]
        sort:
          type: integer
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        distance:
          type: number
          format: decimal
          description: "Distanz in km"
        time_estimate:
          type: integer
          description: "Geschätzte Dauer in Minuten"
        route_color:
          type: string
          description: "Farbe der Route (HEX)"
        featured_image:
          $ref: '#/components/schemas/directus_file'
        geometry:
          type: object
          description: "GeoJSON LineString – Streckenverlauf der Route"
          properties:
            type:
              type: string
              example: LineString
            coordinates:
              type: array
              items:
                type: array
                items:
                  type: number
              example: [[13.58, 52.44], [13.59, 52.45]]
        komoot_link:
          type: string
          description: Link zur Route auf Komoot
        is_lmb_route:
          type: boolean
          description: Gibt an, ob es sich um eine LMB-Route handelt
        difficulty:
          description: "Schwierigkeitsgrad (M2O → route_difficulty)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/route_difficulty'
        route_type:
          description: "Routentyp (M2O → route_types)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/route_types'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/routes_translations'
        gallery:
          type: array
          description: "Bildergalerie (M2M über routes_files)"
          items:
            $ref: '#/components/schemas/directus_file'
        waypoints:
          type: array
          description: |
            Wegpunkte der Route (M2M über routes_places).
            Jeder Wegpunkt kann eigene Kategorien, Überschriften und Beschreibungen haben.
          items:
            $ref: '#/components/schemas/routes_places'
        route_pois:
          type: array
          description: "Points of Interest entlang der Route (M2M über routes_places_pois)"
          items:
            $ref: '#/components/schemas/routes_places_pois'

    routes_translations:
      type: object
      properties:
        id:
          type: integer
        routes_id:
          type: string
          format: uuid
        languages_code:
          type: string
        title:
          type: string
          description: Titel der Route (required)
        slug:
          type: string
          description: URL-Slug (required)
        subtitle:
          type: string
          description: Untertitel
        short_description:
          type: string
          description: Kurzbeschreibung (Plain Text)
        description:
          type: string
          description: Ausführliche Beschreibung (HTML)
        route_intro:
          type: string
          description: Einführungstext (Plain Text)

    routes_places:
      type: object
      description: "Wegpunkt einer Route (Junction: routes ↔ places)"
      properties:
        id:
          type: integer
        routes_id:
          type: string
          format: uuid
        places_id:
          description: "Der verknüpfte Ort"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/places'
        sort:
          type: integer
        waypoint_category:
          type: array
          description: "POI-Kategorien für diesen Wegpunkt (M2M → routePOI_types)"
          items:
            $ref: '#/components/schemas/routePOI_types'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/routes_places_translations'

    routes_places_translations:
      type: object
      properties:
        id:
          type: integer
        routes_places_id:
          type: integer
        languages_code:
          type: string
        alt_headline:
          type: string
          description: Alternative Überschrift für den Wegpunkt
        alt_subheadline:
          type: string
          description: Alternative Unterüberschrift
        alt_description:
          type: string
          description: Alternative Beschreibung (HTML)

    routes_places_pois:
      type: object
      description: "POI entlang einer Route (Junction: routes ↔ places)"
      properties:
        id:
          type: integer
        routes_id:
          type: string
          format: uuid
        places_id:
          description: "Der verknüpfte Ort"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/places'
        poi_type:
          type: array
          description: "POI-Kategorien (M2M → routePOI_types)"
          items:
            $ref: '#/components/schemas/routePOI_types'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/routes_places_pois_translations'

    routes_places_pois_translations:
      type: object
      properties:
        id:
          type: integer
        routes_places_pois_id:
          type: integer
        languages_code:
          type: string
        alt_headline:
          type: string
          description: Alternative Überschrift für den POI
        alt_subheadline:
          type: string
          description: Alternative Unterüberschrift
        alt_description:
          type: string
          description: Alternative Beschreibung (HTML)

    # ── ROUTE TYPES ──
    route_types:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        icon:
          type: string
          description: Material Icon Name
        key:
          type: string
          description: Technischer Schlüssel
        theme:
          type: string
          format: uuid
          description: "Zugehöriges Theme (M2O → themes)"
        translations:
          type: array
          items:
            $ref: '#/components/schemas/route_types_translations'

    route_types_translations:
      type: object
      properties:
        id:
          type: integer
        route_types_id:
          type: string
          format: uuid
        languages_code:
          type: string
        title:
          type: string

    # ── ROUTE DIFFICULTY ──
    route_difficulty:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        translations:
          type: array
          items:
            $ref: '#/components/schemas/route_difficulty_translations'

    route_difficulty_translations:
      type: object
      properties:
        id:
          type: integer
        route_difficulty_id:
          type: string
          format: uuid
        languages_code:
          type: string
        title:
          type: string

    # ── ROUTE POI TYPES ──
    routePOI_types:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        svg_icon:
          type: string
          description: SVG-Code des Icons
        translations:
          type: array
          items:
            $ref: '#/components/schemas/routePOI_types_translations'

    routePOI_types_translations:
      type: object
      properties:
        id:
          type: integer
        routePOI_types_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── JOBS ──
    jobs:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [published, draft, archived]
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        application_link:
          type: string
          description: "Optional: Externer Bewerbungslink (falls nicht über internes Formular)"
        application_deadline:
          type: string
          format: date
          description: Bewerbungsfrist
        featured_image:
          $ref: '#/components/schemas/directus_file'
        employment_category:
          description: "Beschäftigungskategorie (M2O → employment_categories)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/employment_categories'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/jobs_translations'
        organization:
          type: array
          description: "Zugehörige Organisationen (M2M über organizations_jobs)"
          items:
            $ref: '#/components/schemas/organizations'
        employment_type:
          type: array
          description: "Beschäftigungsarten (M2M über jobs_employment_type, z.B. Vollzeit, Teilzeit)"
          items:
            $ref: '#/components/schemas/employment_type'
        job_location:
          type: array
          description: "Arbeitsorte (M2M über jobs_places)"
          items:
            $ref: '#/components/schemas/places'
        applications:
          type: array
          description: "Eingegangene Bewerbungen (O2M → job_applications)"
          items:
            $ref: '#/components/schemas/job_applications'

    jobs_translations:
      type: object
      properties:
        id:
          type: integer
        jobs_id:
          type: string
          format: uuid
        languages_code:
          type: string
        title:
          type: string
          description: Stellenbezeichnung (required)
        slug:
          type: string
          description: URL-Slug (required)
        is_active:
          type: boolean
          description: Gibt an, ob die Übersetzung aktiv ist
        description:
          type: string
          description: Stellenbeschreibung (HTML)
        salary:
          type: string
          description: Gehaltsangabe
        requirements:
          type: string
          description: Anforderungen (HTML)
        skills:
          type: string
          description: Gewünschte Fähigkeiten (HTML)
        benefits:
          type: string
          description: Benefits / Was wir bieten (HTML)

    # ── EMPLOYMENT TYPE ──
    employment_type:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        translations:
          type: array
          items:
            $ref: '#/components/schemas/employment_type_translations'

    employment_type_translations:
      type: object
      properties:
        id:
          type: integer
        employment_type_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── EMPLOYMENT CATEGORIES ──
    employment_categories:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        color:
          type: string
          format: uuid
          description: "Zugehöriges Theme für Farbgebung (M2O → themes)"
        translations:
          type: array
          items:
            $ref: '#/components/schemas/employment_categories_translations'

    employment_categories_translations:
      type: object
      properties:
        id:
          type: integer
        employment_categories_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── JOB TITLES ──
    job_titles:
      type: object
      description: "Vordefinierte Berufsbezeichnungen (z.B. für Personen/Organisationen-Zuordnung)"
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        internal_name:
          type: string
          readOnly: true
          description: Automatisch aus deutscher Übersetzung synchronisiert
        translations:
          type: array
          items:
            $ref: '#/components/schemas/job_titles_translations'

    job_titles_translations:
      type: object
      properties:
        id:
          type: integer
        job_titles_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string
          description: Berufsbezeichnung (generisch/männlich)
        name_female:
          type: string
          description: Berufsbezeichnung (weiblich)
        name_nonbinary:
          type: string
          description: "Berufsbezeichnung (geschlechtsneutral)"

    # ── JOB APPLICATIONS ──
    job_applications:
      type: object
      description: "Bewerbungen über das Website-Formular (Backup-Zwecke)"
      properties:
        id:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        vorname:
          type: string
          description: Vorname des Bewerbers (required)
        nachname:
          type: string
          description: Nachname des Bewerbers (required)
        email:
          type: string
          description: E-Mail-Adresse (required)
        telefon:
          type: string
        job_name:
          type: string
          readOnly: true
          description: Name der Stelle (aus Formular übernommen)
        job_contact:
          type: string
          readOnly: true
          description: Kontakt-E-Mail der Stelle
        consent:
          type: boolean
          readOnly: true
          description: Datenschutz-Einwilligung
        job:
          description: "Zugehörige Stelle (M2O → jobs)"
          type: string
          format: uuid
        attachments:
          type: array
          description: "Angehängte Dateien (M2M über job_applications_files)"
          items:
            $ref: '#/components/schemas/directus_file'

    # ── FILES ──
    directus_file:
      type: object
      description: |
        Bild- und Mediendatei. Bild-URLs: https://data.tkt-berlin.de/assets/{id}
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        filename_download:
          type: string
        width:
          type: integer
        height:
          type: integer
        credit_line:
          type: string
          description: |
            Bildnachweis / Copyright-Hinweis (z.B. „Foto: Max Mustermann / TKT").
            Wird serverseitig automatisch aus Fotograf und Quelle generiert.
            **Pflichtfeld für externe Ausspielung**: Bilder ohne `credit_line`
            sollten nicht veröffentlicht werden.

servers:
  - url: https://data.tkt-berlin.de
    description: DataHub von TKT Berlin
