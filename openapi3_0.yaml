openapi: 3.0.3
info:
  title: TKT Berlin API
  version: 0.3.0
  description: |
    API-Dokumentation zum DataHub des Tourismusvereins Berlin Treptow-Köpenick e.V.

    Basiert auf Directus als Headless CMS. Alle Endpunkte folgen dem Directus-REST-API-Schema.

    ## Bild-URLs
    Bilder sind nach folgendem Schema abrufbar:
    `https://data.tkt-berlin.de/assets/{file_id}`

    Optionale Transformationsparameter (Query-String):
    - `width` / `height` – Größe in Pixel
    - `fit` – `cover`, `contain`, `inside`, `outside`
    - `quality` – 1–100 (JPEG/WebP)
    - `format` – `jpg`, `png`, `webp`, `avif`

    ## Bildrechte & Copyright
    Jede Bilddatei trägt im Feld `credit_line` einen fertig formatierten Copyright-Hinweis
    (z.B. „Foto: Max Mustermann / TKT"). Dieser muss bei jeder externen Ausspielung
    mit angegeben werden.

    `credit_line` wird **nicht** über einen separaten Endpunkt abgerufen, sondern ist
    über die `fields`-Syntax direkt in jede Response eingebettet — egal ob am
    `featured_image` oder in einer Galerie. Beispiel für Events:

    ```
    GET /items/events?fields=id,translations.title,featured_image.id,featured_image.credit_line,gallery.directus_files_id.id,gallery.directus_files_id.credit_line
    ```

    Damit liefert ein **einziger** Event-Request sowohl die Event-Inhalte als auch
    die Copyright-Hinweise aller verknüpften Bilder.

    ## Authentifizierung
    Alle Anfragen erfordern ein Bearer-Token im `Authorization`-Header.

    ## Mehrsprachigkeit
    Inhalte liegen in der Regel als Translations vor (Deutsch: `de-DE`, Englisch: `en-GB`).
    Translations können über `deep`-Filter auf eine Sprache eingeschränkt werden.

paths:
  # ──────────────────────────────────────────────
  #  EVENTS
  # ──────────────────────────────────────────────
  /items/events:
    get:
      summary: Liste aller Events
      description: |
        Gibt alle Hauptevents zurück. Events können vom Typ `event`, `program` oder `tour` sein.
        Enthält Relationen zu Kategorien, Organisationen, Orten, Sprachen, Übersetzungen, Galerien und Guides.

        **Bildrechte / Copyright:** Der Copyright-Hinweis liegt am jeweiligen Bild im Feld
        `credit_line` (siehe Schema `directus_file`). Er kann per `fields`-Parameter direkt
        mitgeladen werden — ohne separaten Request gegen einen Bilder-Endpunkt:

        ```
        ?fields=*,featured_image.id,featured_image.credit_line,gallery.directus_files_id.id,gallery.directus_files_id.credit_line
        ```

        Für externe Ausspielung (z.B. Partner-Websites) ist `credit_line` verpflichtend
        mitzurendern.
      tags:
        - events
      parameters:
        - $ref: '#/components/parameters/fields'
        - name: filter[type][_eq]
          in: query
          required: false
          schema:
            type: string
            enum: [event, program, tour]
          description: Filter nach Event-Typ
        - name: filter[archived][_eq]
          in: query
          required: false
          schema:
            type: boolean
          description: Filter nach archivierten Events
        - name: filter[is_highlight][_eq]
          in: query
          required: false
          schema:
            type: boolean
          description: Nur hervorgehobene Events
        - name: filter[approval_status][_eq]
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
          description: Filter nach Freigabestatus
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/deep'
      responses:
        '200':
          description: Liste von Events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/events'

  /items/events/{id}:
    get:
      summary: Ein einzelnes Event abrufen
      description: |
        Liefert ein Event inkl. aller Relationen.

        **Bildrechte / Copyright:** Der Copyright-Hinweis wird über `credit_line`
        am Bild-Schema (`directus_file`) geliefert und kann per `fields`-Parameter
        direkt mitgeladen werden (siehe Listen-Endpunkt `/items/events`).
      tags:
        - events
      parameters:
        - name: id
          in: path
          required: true
          description: UUID des Events
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Ein einzelnes Event
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/events'

  # ──────────────────────────────────────────────
  #  EVENT OCCURRENCES
  # ──────────────────────────────────────────────
  /items/event_occurrences:
    get:
      summary: Liste aller Einzeltermine
      description: |
        Enthält alle generierten Einzeltermine der Events.
        Termine werden automatisch aus der Wiederholungslogik eines Events generiert,
        können aber manuell überschrieben werden (`updated_by_user = true`).
        Status kann `active`, `cancelled`, `postponed` oder `archived` sein.
      tags:
        - event_occurrences
      parameters:
        - name: filter[event][_eq]
          in: query
          description: Filter nach Event-ID
          required: false
          schema:
            type: string
            format: uuid
        - name: filter[status][_eq]
          in: query
          description: Filter nach Status
          required: false
          schema:
            type: string
            enum: [active, cancelled, postponed, archived]
        - name: filter[start_date][_gte]
          in: query
          description: Termine ab diesem Datum
          required: false
          schema:
            type: string
            format: date-time
        - name: filter[start_date][_lte]
          in: query
          description: Termine bis zu diesem Datum
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Liste von Einzelterminen
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/event_occurrences'

