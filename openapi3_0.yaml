          description: Liste von Öffnungszeiten-Perioden
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/opening_hours_periods'

security:
  - BearerAuth: []

components:
  # ──────────────────────────────────────────────
  #  SECURITY
  # ──────────────────────────────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ──────────────────────────────────────────────
  #  SHARED PARAMETERS
  # ──────────────────────────────────────────────
  parameters:
    fields:
      name: fields
      in: query
      required: false
      schema:
        type: string
        example: "*.*"
      description: |
        Gibt an, welche Felder geladen werden sollen.
        - `*` – Alle Felder der Collection
        - `*.*` – Alle Felder inkl. direkte Relationen
        - `*.*.*` – Drei Ebenen tief
        - `field1,field2` – Nur bestimmte Felder
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
      description: Maximale Anzahl zurückgegebener Items
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Anzahl zu überspringender Items (für Pagination)
    sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        example: "-date_created"
      description: |
        Sortierung. Prefix `-` für absteigend. Mehrere Felder mit Komma getrennt.
        Beispiel: `sort=-start_date,title`
    deep:
      name: deep
      in: query
      required: false
      schema:
        type: string
      description: |
        Filter und Sortierung für verschachtelte Relationen (JSON-Format).
        Beispiel: `deep[translations][_filter][languages_code][_eq]=de-DE`

  # ──────────────────────────────────────────────
  #  SCHEMAS
  # ──────────────────────────────────────────────
  schemas:
    # ── EVENTS ──
    events:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        type:
          type: string
          enum: [event, program, tour]
          description: Art der Veranstaltung
        start_date:
          type: string
          format: date-time
          description: Initiales Startdatum. Wird für die Wiederholungslogik und die Generierung des ersten Termins verwendet.
        end_date:
          type: string
          format: date-time
          description: Initiales Enddatum. Wird für die Wiederholungslogik und die Generierung des ersten Termins verwendet.
        ticket_link:
          type: string
          description: URL zu einem Ticketsystem
          example: https://tickets.example.com
        featured_image:
          $ref: '#/components/schemas/directus_file'
        external_link:
          type: string
          description: URL zu einer passenden Eventwebseite
          example: https://www.example.com/event
        is_highlight:
          type: boolean
          description: Gibt an, ob eine Veranstaltung hervorgehoben werden soll
        is_recurring:
          type: boolean
          description: Gibt an, ob eine Wiederholungslogik greift. Der erste Termin wird immer generiert, auch wenn false.
        price:
          type: number
          format: decimal
          description: "(DEPRECATED) Preis. Verwende stattdessen `translations.price_display` und `translations.price_info`."
          deprecated: true
        location:
          description: "Zugehöriger Ort (M2O → places)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/places'
        group_size_min:
          type: integer
          description: Mindestteilnehmerzahl (nur bei type = program oder tour)
        group_size_max:
          type: integer
          description: Maximale Teilnehmerzahl (nur bei type = program oder tour)
        door_time:
          type: string
          format: time
          example: "17:00:00"
          description: Zeitangabe zum Einlass
        archived:
          type: boolean
          description: Wenn true, ist das Event abgelaufen bzw. alle Termine sind abgelaufen
        internal_name:
          type: string
          readOnly: true
          description: Automatisch befüllter interner Name (deutscher Titel aus Translations)
        booking_type:
          type: string
          enum: [scheduled, on_request]
          description: Art der Buchung (feste Termine oder auf Anfrage)
        tour_type:
          type: string
          enum: [base, extension]
          description: Nur bei type=tour – Basis-Tour oder Erweiterung
        # ── Submission / Approval ──
        approval_status:
          type: string
          enum: [pending, approved, rejected]
          description: Status der Event-Freigabe (für extern eingereichte Events)
        submission_source:
          type: string
          enum: [external_form, internal]
          readOnly: true
          description: Herkunft des Events
        date_reviewed:
          type: string
          format: date-time
          readOnly: true
          description: Zeitpunkt der Freigabe/Ablehnung
        submitter_email:
          type: string
          description: E-Mail des Einreichers für Rückfragen
        submitter_notes:
          type: string
          description: Anmerkungen des Einreichers
        reviewer_notes:
          type: string
          description: Interne Notizen der Redaktion (nicht öffentlich)
        proposed_location:
          type: object
          description: Vorschlag für neuen Ort (falls nicht in Liste vorhanden, JSON)
        proposed_organization:
          type: object
          description: Vorschlag für neue Organisation (falls nicht in Liste vorhanden, JSON)
        # ── Wiederholungslogik ──
        repeat_frequency:
          type: string
          enum: [P1D, P2D, P3D, P1W, P2W, P3W, P1M, P2M, P3M, P1Y]
          description: Wiederholungsfrequenz nach ISO 8601 Duration Format
        by_day:
          type: array
          items:
            type: string
            enum: [MO, TU, WE, TH, FR, SA, SU]
          description: Wiederholung an bestimmten Wochentagen
        by_month:
          type: array
          items:
            type: string
          description: "Wiederholung nur in bestimmten Monaten (1–12)"
        repeat_count:
          type: integer
          description: Anzahl der Wiederholungen
        repeat_until:
          type: string
          format: date
          description: "Optional: Datum, bis zu dem das Event wiederholt werden soll. Alternative zu repeat_count."
        except_dates:
          type: array
          description: Datumsangaben, die von der Wiederholung ausgenommen sind
          items:
            type: object
            properties:
              except_single_date:
                type: string
                format: date
        by_month_week:
          type: array
          items:
            type: string
          description: "Wiederholung in bestimmter Woche eines Monats (1–5)"
        by_month_day:
          type: array
          items:
            type: string
          description: "Wiederholung an bestimmten Tagen des Monats (1–31)"
        monthly_recurring_type:
          type: string
          enum: [by_eventday, by_month_days, by_weekdays]
          description: Wiederholungstyp bei monatlichen Wiederholungen
        weekday_times:
          type: array
          description: |
            Optional: Unterschiedliche Uhrzeiten für verschiedene Wochentage.
            Wenn leer, werden die Standard-Zeiten aus start_date/end_date verwendet.
          items:
            type: object
            properties:
              days:
                type: array
                items:
                  type: string
                  enum: [MO, TU, WE, TH, FR, SA, SU]
                description: Wochentage für diese Zeiten
              months:
                type: array
                items:
                  type: integer
                description: "Optional: Einschränkung auf bestimmte Monate (1–12)"
              start_time:
                type: string
                format: time
              end_time:
                type: string
                format: time
              door_time:
                type: string
                format: time
        # ── Relationen ──
        translations:
          type: array
          items:
            $ref: '#/components/schemas/events_translations'
        organization:
          type: array
          description: "Zugehörige Organisationen (M2M über organizations_events)"
          items:
            $ref: '#/components/schemas/organizations'
        categories:
          type: array
          description: "Event-Kategorien (M2M über events_event_categories)"
          items:
            $ref: '#/components/schemas/event_categories'
        occurrences:
          type: array
          description: "Generierte Einzeltermine (O2M → event_occurrences)"
          items:
            $ref: '#/components/schemas/event_occurrences'
        language:
          type: array
          description: "Sprachen, in denen das Event angeboten wird (M2M über events_event_languages)"
          items:
            $ref: '#/components/schemas/event_languages'
        gallery:
          type: array
          description: "Bildergalerie (M2M über events_files)"
          items:
            $ref: '#/components/schemas/directus_file'
        guides:
          type: array
          description: "Zugeordnete Guides/Personen (M2M über events_persons)"
          items:
            $ref: '#/components/schemas/persons'
        extensions:
          type: array
          description: "Erweiterungs-Events (M2M über events_extensions, nur bei tour_type=base)"
          items:
            $ref: '#/components/schemas/events'
        is_extension_of:
          type: array
          description: "Basis-Events zu denen dieses Event eine Erweiterung ist (M2M über events_extensions)"
          items:
            $ref: '#/components/schemas/events'

    # ── EVENTS TRANSLATIONS ──
    events_translations:
      type: object
      properties:
        id:
          type: integer
        events_id:
          type: string
          format: uuid
        languages_code:
          type: string
          example: de-DE
        title:
          type: string
          description: Titel des Events (required)
        slug:
          type: string
          description: URL-Slug (required, auto-generiert)
        description:
          type: string
          description: Ausführliche Beschreibung (HTML)
        short_description:
          type: string
          description: Kurzbeschreibung (Plain Text)
        is_active:
          type: boolean
          description: Gibt an, ob die Übersetzung aktiv/sichtbar ist
        ticket_info:
          type: string
          description: Informationen zu Tickets (Plain Text)
        duration:
          type: string
          description: Dauer-Angabe (z.B. "2 Stunden", "ca. 90 Min.")
        meeting_point_info:
          type: string
          description: Informationen zum Treffpunkt
        price_info:
          type: string
          description: Ausführliche Preisinformationen (HTML)
        price_unit:
          type: string
          description: "Einheit des Preises (z.B. pro Person, pro Gruppe)"
        price_display:
          type: string
          description: "Gut lesbare Preisangabe (z.B. ab 12 €, kostenlos, frei wählbar)"
        tags:
          type: array
          description: "Event-Tags (M2M über events_translations_event_tags)"
          items:
            $ref: '#/components/schemas/event_tags'

    # ── EVENT OCCURRENCES ──
    event_occurrences:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, cancelled, postponed, archived]
          description: Status des Einzeltermins
        event:
          description: "ID des zugehörigen Events (M2O → events)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/events'
        start_date:
          type: string
          format: date-time
          description: Startdatum inkl. Uhrzeit
        end_date:
          type: string
          format: date-time
          description: Enddatum inkl. Uhrzeit (optional)
        door_time:
          type: string
          format: time
          description: Zeitangabe zum Einlass
        updated_by_user:
          type: boolean
          description: Angabe, ob der Termin nachträglich manuell bearbeitet wurde
        original_date:
          type: string
          format: date-time
          readOnly: true
          description: Ursprünglich generiertes Datum (vor manueller Änderung)

    # ── EVENT CATEGORIES ──
    event_categories:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        translations:
          type: array
          items:
            $ref: '#/components/schemas/event_categories_translations'
        events:
          type: array
          description: "Zugeordnete Events (M2M)"
          items:
            $ref: '#/components/schemas/events'

    event_categories_translations:
      type: object
      properties:
        id:
          type: integer
        event_categories_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── EVENT TAGS ──
    event_tags:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        name:
          type: string

    # ── EVENT LANGUAGES ──
    event_languages:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sort:
          type: integer
        flag:
          $ref: '#/components/schemas/directus_file'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/event_languages_translations'

    event_languages_translations:
      type: object
      properties:
        id:
          type: integer
        event_languages_id:
          type: string
          format: uuid
        languages_code:
          type: string
        name:
          type: string

    # ── ORGANIZATIONS ──
    organizations:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        name:
          type: string
          description: Name der Organisation (required)
        slug:
          type: string
          description: URL-Slug (required)
        type:
          description: "Organisationstyp (M2O → organization_type)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/organization_type'
        phone:
          type: string
        email:
          type: string
        website:
          type: string
          description: Website-URL (ohne https://)
        address:
          type: string
        postal_code:
          type: string
        city:
          type: string
        logo:
          $ref: '#/components/schemas/directus_file'
        featured_image:
          $ref: '#/components/schemas/directus_file'
        not_berlin:
          type: boolean
          description: Gibt an, ob die Organisation außerhalb Berlins liegt
        translations:
          type: array
          items:
            $ref: '#/components/schemas/organizations_translations'
        events:
          type: array
          description: "Zugeordnete Events (M2M über organizations_events)"
          items:
            $ref: '#/components/schemas/events'
        jobs:
          type: array
          description: "Stellenanzeigen (M2M über organizations_jobs)"
          items:
            $ref: '#/components/schemas/jobs'
        places:
          type: array
          description: "Zugeordnete Orte (O2M)"
          items:
            $ref: '#/components/schemas/places'
        persons:
          type: array
          description: |
            Zuordnungen zu Personen (O2M → junction_organizations_persons).
            Jede Zuordnung enthält die Person, Abteilungen, Jobtitel und ob die Person Stellenkontakt ist.
          items:
            $ref: '#/components/schemas/junction_organizations_persons'

    organizations_translations:
      type: object
      properties:
        id:
          type: integer
        organizations_id:
          type: string
          format: uuid
        languages_code:
          type: string
        short_description:
          type: string

    organization_type:
      type: object
      properties:
        id:
          type: string
          format: uuid
        translations:
          type: array
          items:
            $ref: '#/components/schemas/organization_type_translations'

    organization_type_translations:
      type: object
      properties:
        id:
          type: integer
        organization_type_id:
          type: string
          format: uuid
        languages_code:
          type: string
        Name:
          type: string

    # ── PLACES ──
    places:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_created:
          type: string
          format: uuid
        date_created:
          type: string
          format: date-time
        user_updated:
          type: string
          format: uuid
        date_updated:
          type: string
          format: date-time
        status:
          type: string
          enum: [published, draft, archived]
          description: Veröffentlichungsstatus
        name:
          type: string
          description: Name des Ortes (required)
        slug:
          type: string
          description: URL-Slug (required)
        address:
          type: string
        postal_code:
          type: string
        city:
          type: string
        phone:
          type: string
        phone_clean:
          type: string
          readOnly: true
          description: "Automatisch generiert: Telefonnummer ohne Leerzeichen/Sonderzeichen für tel:-Links"
        email:
          type: string
        weblink:
          type: string
        featured_image:
          $ref: '#/components/schemas/directus_file'
        place_id:
          type: string
          readOnly: true
          description: Google Places ID
        rating:
          type: string
          readOnly: true
          description: Google-Bewertung
        location:
          type: object
          readOnly: true
          description: "GeoJSON Point (geometry.Point) – Koordinaten des Ortes"
          properties:
            type:
              type: string
              example: Point
            coordinates:
              type: array
              items:
                type: number
              example: [13.5804, 52.4433]
        manual_location:
          type: boolean
          description: Wenn true, wird die Location manuell gesetzt (kein Google-Sync)
        lat:
          type: string
          readOnly: true
          deprecated: true
          description: "(DEPRECATED) Verwende stattdessen `location.coordinates`"
        long:
          type: string
          readOnly: true
          deprecated: true
          description: "(DEPRECATED) Verwende stattdessen `location.coordinates`"
        is_not_berlin:
          type: boolean
        organization:
          description: "Zugehörige Organisation (M2O → organizations)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/organizations'
        region:
          description: "Zugehörige Region (M2O → regions)"
          oneOf:
            - type: string
              format: uuid
            - $ref: '#/components/schemas/regions'
        google_sync:
          type: boolean
          description: Gibt an, ob Daten mit Google Places synchronisiert werden
        google_last_sync:
          type: string
          format: date-time
          readOnly: true
          description: Zeitpunkt des letzten Google-Syncs
        opening_hours:
          type: array
          deprecated: true
          description: "(DEPRECATED) Verwende stattdessen `opening_hours_periods`"
          items:
            type: object
        translations:
          type: array
          items:
            $ref: '#/components/schemas/places_translations'
        categories:
          type: array
          description: "Orts-Kategorien (M2M über places_places_categories)"
          items:
            $ref: '#/components/schemas/places_categories'
        opening_hours_periods:
          type: array
          description: "Saisonale Öffnungszeiten (O2M → opening_hours_periods)"
          items:
            $ref: '#/components/schemas/opening_hours_periods'
        events:
          type: array
          description: "Events an diesem Ort (O2M)"
          items:
            $ref: '#/components/schemas/events'
        routes:
          type: array
          description: "Routen, die diesen Ort einschließen (M2M über routes_places)"
          items:
            $ref: '#/components/schemas/routes'
        jobs:
          type: array
          description: "Stellenanzeigen an diesem Ort (M2M über jobs_places)"
          items:
            $ref: '#/components/schemas/jobs'

    places_translations:
      type: object
      properties:
        id:
          type: integer
        places_id:
          type: string
          format: uuid
        languages_code:
          type: string
        active:
          type: boolean
          description: Gibt an, ob diese Übersetzung aktiv ist
        name:
          type: string
          description: Übersetzter Name (falls anders als Google-Name)
        short_description:
          type: string
        content:
          type: string
          description: Ausführliche Beschreibung (HTML)

    # ── PLACES CATEGORIES ──
    places_categories:
      type: object
      properties:
        id:
          type: string
          format: uuid
